<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>KodCode Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b14;--bg2:#0c1221;--bg3:#111827;
  --card:rgba(255,255,255,0.04);--card-b:rgba(255,255,255,0.08);--card-h:rgba(255,255,255,0.07);
  --accent:#38bdf8;--accent2:#818cf8;--accent3:#34d399;--accent4:#f472b6;--accent5:#fb923c;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --danger:#f87171;--warn:#fbbf24;--ok:#34d399;
  --sw:260px;
}
html,body{height:100%;font-family:'Noto Sans Hebrew',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#root{height:100%}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}

.fade-in{animation:fadeUp .4s ease both}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;animation:orbFloat 8s ease-in-out infinite}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(56,189,248,.25),transparent 70%);top:-200px;right:-200px;animation-delay:0s}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(129,140,248,.2),transparent 70%);bottom:-150px;left:-150px;animation-delay:-3s}
.orb3{width:350px;height:350px;background:radial-gradient(circle,rgba(52,211,153,.15),transparent 70%);top:40%;left:30%;animation-delay:-5s}

.login-card{position:relative;z-index:10;width:100%;max-width:440px;background:rgba(12,18,33,0.85);border:1px solid rgba(56,189,248,.15);border-radius:24px;padding:48px 44px;backdrop-filter:blur(24px);box-shadow:0 0 80px rgba(56,189,248,.06),0 40px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}

.login-logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:8px}
.logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;box-shadow:0 8px 24px rgba(56,189,248,.3);flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{text-align:center;color:var(--text3);font-size:13px;margin-bottom:36px;margin-top:6px}

.form-group{margin-bottom:18px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.form-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:var(--text);font-size:15px;font-family:'Noto Sans Hebrew',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;direction:ltr}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.15)}
.form-input::placeholder{color:var(--text3)}

.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;font-family:'Noto Sans Hebrew',sans-serif;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 8px 24px rgba(56,189,248,.25)}
.btn-primary:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 12px 32px rgba(56,189,248,.35)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

.err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--danger);margin-top:14px;text-align:center}
.spinner{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:var(--bg2);border-left:1px solid var(--card-b);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100;transition:transform .3s}
.sb-top{padding:24px 20px 16px;border-bottom:1px solid var(--card-b)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text)}

.sb-user{padding:16px 20px;border-bottom:1px solid var(--card-b);display:flex;align-items:center;gap:12px}
.sb-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:11px;color:var(--text3)}

.sb-nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;margin-bottom:3px;user-select:none;transition:background .15s,color .15s}
.nav-item:hover{background:var(--card-h);color:var(--text)}
.nav-item.active{background:rgba(56,189,248,.12);color:var(--accent)}
.nav-icon{font-size:18px;flex-shrink:0;width:22px;text-align:center}
.nav-badge{margin-right:auto;background:var(--accent);color:var(--bg);font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}

.sb-footer{padding:14px 12px;border-top:1px solid var(--card-b)}
.btn-logout{width:100%;padding:10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;color:var(--danger);font-size:13px;font-weight:600;font-family:'Noto Sans Hebrew',sans-serif;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-logout:hover{background:rgba(248,113,113,.15)}

/* ── MAIN ── */
.main{flex:1;margin-right:var(--sw);padding:32px 36px;min-height:100vh;overflow-y:auto}
.page-header{margin-bottom:32px}
.page-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--text);line-height:1.1}
.page-sub{font-size:14px;color:var(--text3);margin-top:6px}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:350px;gap:16px;color:var(--text2)}
.spinner-lg{width:42px;height:42px;border:3px solid rgba(56,189,248,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-size:14px;animation:pulse 1.5s ease infinite}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:22px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s,background .2s;cursor:default}
.stat-card::before{content:'';position:absolute;inset:0;background:var(--grad,transparent);opacity:.06;pointer-events:none}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.14);background:var(--card-h)}
.stat-card-icon{font-size:26px;margin-bottom:12px}
.stat-card-value{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;line-height:1;margin-bottom:5px;background:var(--vgrad,none);-webkit-background-clip:var(--vclip,initial);-webkit-text-fill-color:var(--vtfill,var(--text))}
.stat-card-label{font-size:12px;color:var(--text3);font-weight:500}
.stat-card-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ── TWO COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ── SECTION CARD ── */
.sc{background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:24px}
.sc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.sc-count{font-size:11px;background:rgba(255,255,255,.07);color:var(--text3);padding:2px 8px;border-radius:999px;font-weight:600;margin-right:4px}

/* ── COURSE ROW ── */
.course-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.course-row:last-child{border-bottom:none;padding-bottom:0}
.c-abbr{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:11px;color:var(--text3);margin-top:2px}
.prog-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:7px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s ease}

.grade-pill{font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px;flex-shrink:0}
.gp-high{background:rgba(52,211,153,.15);color:var(--ok)}
.gp-mid{background:rgba(251,191,36,.15);color:var(--warn)}
.gp-low{background:rgba(248,113,113,.15);color:var(--danger)}
.gp-none{background:rgba(255,255,255,.07);color:var(--text3)}

/* ── ASSIGN ROW ── */
.assign-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.assign-row:last-child{border-bottom:none}
.a-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.a-info{flex:1;min-width:0}
.a-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-course{font-size:11px;color:var(--text3);margin-top:2px}
.days-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.dt-danger{background:rgba(248,113,113,.15);color:var(--danger);border:1px solid rgba(248,113,113,.25)}
.dt-warn{background:rgba(251,191,36,.15);color:var(--warn)}
.dt-ok{background:rgba(52,211,153,.12);color:var(--ok)}
.dt-over{background:rgba(248,113,113,.2);color:var(--danger);border:1px solid rgba(248,113,113,.35)}
.dt-done{background:rgba(255,255,255,.06);color:var(--text3)}

/* ── COURSE GRID ── */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.course-card{background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:24px;transition:border-color .2s,transform .2s,background .2s;cursor:default}
.course-card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-3px);background:var(--card-h)}
.cc-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.cc-abbr{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;flex-shrink:0}
.cc-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.cc-cat{font-size:12px;color:var(--text3);margin-top:3px}
.cc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.cc-prog-label{font-size:12px;color:var(--text3)}

/* ── GRADE ITEMS ── */
.grade-items{margin-top:12px;border-top:1px solid rgba(255,255,255,.05);padding-top:12px}
.gi-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--text2)}
.gi-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:12px}
.gi-grade{font-weight:700;font-family:'Syne',sans-serif;font-size:14px}

/* ── GRADES LIST ── */
.grade-card{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:20px 22px;margin-bottom:12px;transition:background .15s}
.grade-card:hover{background:var(--card-h)}
.grade-card-top{display:flex;align-items:center;justify-content:space-between}
.gc-name{font-size:14px;font-weight:600;color:var(--text)}
.gc-grade{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.gc-grade.high{color:var(--ok)} .gc-grade.mid{color:var(--warn)} .gc-grade.low{color:var(--danger)} .gc-grade.none{color:var(--text3);font-size:16px}
.grade-sub-items{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gsi{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 12px}
.gsi-name{font-size:11px;color:var(--text3);margin-bottom:4px}
.gsi-val{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;color:var(--text)}

/* ── ASSIGNMENTS PAGE ── */
.sec-label{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.sec-label::before{content:'';display:block;height:1px;flex:1;background:rgba(255,255,255,.06)}
.assign-card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:16px 20px;margin-bottom:10px;transition:background .15s,border-color .15s}
.assign-card:hover{background:var(--card-h)}
.assign-card.overdue{border-color:rgba(248,113,113,.2)}
.assign-card.completed{opacity:.5}
.ac-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ac-dot.open{background:var(--accent);box-shadow:0 0 8px rgba(56,189,248,.5)}
.ac-dot.overdue{background:var(--danger)}
.ac-dot.done{background:var(--text3)}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:14px;font-weight:500;color:var(--text)} .completed .ac-name{text-decoration:line-through;color:var(--text3)}
.ac-course{font-size:12px;color:var(--text3);margin-top:3px}
.ac-date{font-size:11px;color:var(--text3);margin-top:2px}

/* ── MESSAGES ── */
.msg-card{display:flex;align-items:flex-start;gap:14px;background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:16px 20px;margin-bottom:10px;transition:background .15s}
.msg-card:hover{background:var(--card-h)}
.msg-card.unread{border-color:rgba(56,189,248,.2);background:rgba(56,189,248,.04)}
.msg-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.msg-dot.unread{background:var(--accent);box-shadow:0 0 8px rgba(56,189,248,.6)}
.msg-dot.read{background:var(--text3)}
.msg-body{flex:1;min-width:0}
.msg-subject{font-size:14px;font-weight:600;color:var(--text)}
.msg-from{font-size:12px;color:var(--text3);margin-top:2px}
.msg-text{font-size:12px;color:var(--text2);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.msg-time{font-size:11px;color:var(--text3);flex-shrink:0}

/* ── PROGRESS RING ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-label{position:absolute;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text)}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:14px}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.07);color:var(--text3)}
.chip.warn{background:rgba(251,191,36,.12);color:var(--warn)}

/* ── REFRESH BTN ── */
.btn-refresh{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);border-radius:8px;color:var(--accent);font-size:12px;font-weight:600;font-family:'Noto Sans Hebrew',sans-serif;padding:6px 14px;cursor:pointer;transition:background .15s}
.btn-refresh:hover{background:rgba(56,189,248,.18)}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback} = React;
const API = window.location.origin;

// ── helpers ──────────────────────────────────────────────────────────────────
const COLORS=['#38bdf8','#818cf8','#34d399','#f472b6','#fb923c','#a78bfa','#22d3ee','#4ade80','#facc15','#f87171'];
function courseColor(name=''){let h=0;for(let c of name)h=c.charCodeAt(0)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function abbr(name=''){const w=name.trim().split(/\s+/);return w.length>=2?(w[0][0]+w[1][0]).toUpperCase():name.slice(0,2).toUpperCase()}
function gradeClass(g){if(typeof g!=='number')return 'none';if(g>=85)return'high';if(g>=60)return'mid';return'low'}
function gradeColor(g){if(typeof g!=='number')return'var(--text3)';if(g>=85)return'var(--ok)';if(g>=60)return'var(--warn)';return'var(--danger)'}
function fmtDate(ts){return new Date(ts*1000).toLocaleDateString('he-IL',{day:'numeric',month:'short'})}
function timeAgo(ts){const d=Date.now()/1000-ts;if(d<60)return'עכשיו';if(d<3600)return`לפני ${Math.floor(d/60)} דק'`;if(d<86400)return`לפני ${Math.floor(d/3600)} ש'`;return`לפני ${Math.floor(d/86400)} ימים`}
function dayTag(a){
  if(a.completed) return{cls:'dt-done',label:'הושלם'};
  if(a.overdue) return{cls:'dt-over',label:'באיחור'};
  if(a.daysLeft<=0) return{cls:'dt-danger',label:'היום'};
  if(a.daysLeft===1) return{cls:'dt-danger',label:'מחר'};
  if(a.daysLeft<=3) return{cls:'dt-danger',label:`${a.daysLeft} ימים`};
  if(a.daysLeft<=7) return{cls:'dt-warn',label:`${a.daysLeft} ימים`};
  return{cls:'dt-ok',label:`${a.daysLeft} ימים`};
}

// ── Progress Ring ─────────────────────────────────────────────────────────
function Ring({value=0,size=80,stroke=7,color='#38bdf8'}){
  const r=size/2-stroke;const circ=2*Math.PI*r;const pct=Math.min(100,Math.max(0,value));
  return(
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
          style={{transition:'stroke-dashoffset .8s ease'}}/>
      </svg>
      <div className="ring-label" style={{fontSize:size>70?18:13,color}}>{pct}%</div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────────────
function LoginPage({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[loading,setL]=useState(false);const[err,setErr]=useState('');
  async function submit(e){
    e.preventDefault();if(!u||!p){setErr('נא למלא את כל השדות');return}
    setL(true);setErr('');
    try{
      const r=await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.trim(),password:p})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||'שגיאת התחברות');
      localStorage.setItem('sessionId',d.sessionId);localStorage.setItem('fullname',d.fullname);
      onLogin(d.sessionId,d.fullname);
    }catch(e){setErr(e.message)}finally{setL(false)}
  }
  return(
    <div className="login-page">
      <div className="orb orb1"/><div className="orb orb2"/><div className="orb orb3"/>
      <div className="login-card fade-in">
        <div className="login-logo"><div className="logo-icon">KC</div><div className="logo-text">KodCode</div></div>
        <div className="login-sub">פורטל הסטודנטים | KodCode Academy</div>
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">תעודת זהות</label>
            <input className="form-input" type="text" placeholder="הכנס תעודת זהות" value={u} onChange={e=>setU(e.target.value)} disabled={loading}/>
          </div>
          <div className="form-group">
            <label className="form-label">סיסמה</label>
            <input className="form-input" type="password" placeholder="הסיסמה שלך" value={p} onChange={e=>setP(e.target.value)} disabled={loading}/>
          </div>
          <button className="btn-primary" type="submit" disabled={loading}>
            {loading&&<span className="spinner"/>}{loading?'מתחבר...':'כניסה למערכת'}
          </button>
          {err&&<div className="err-box">⚠️ {err}</div>}
        </form>
      </div>
    </div>
  );
}

// ── Stat Card ─────────────────────────────────────────────────────────────
function StatCard({icon,value,label,sub,color='#38bdf8',grad}){
  return(
    <div className="stat-card" style={{'--grad':grad||`radial-gradient(circle at top right,${color},transparent)`}}>
      <div className="stat-card-icon">{icon}</div>
      <div className="stat-card-value" style={{color}}>{value??'—'}</div>
      <div className="stat-card-label">{label}</div>
      {sub&&<div className="stat-card-sub">{sub}</div>}
    </div>
  );
}

// ── Overview ──────────────────────────────────────────────────────────────
function Overview({data,fullname}){
  const {courses=[],grades=[],assignments=[],stats={}}=data;
  const open=assignments.filter(a=>!a.completed&&!a.overdue).sort((a,b)=>a.duedate-b.duedate);
  const top5=courses.slice(0,5);
  const gradeMap={};grades.forEach(g=>{gradeMap[g.courseid]=g.grade});
  return(
    <div className="fade-in">
      <div className="stats-grid">
        <StatCard icon="📚" value={stats.totalCourses} label="קורסים פעילים" color="#38bdf8"/>
        <StatCard icon="🏆" value={stats.avgGrade!=null?stats.avgGrade+'%':'—'} label="ממוצע ציונים" color={gradeColor(stats.avgGrade)} sub={stats.avgGrade>=85?'מצוין!':stats.avgGrade>=60?'טוב':'טעון שיפור'}/>
        <StatCard icon="📝" value={stats.openAssignments} label="משימות פתוחות" color="#818cf8"/>
        <StatCard icon="🔴" value={stats.overdueAssignments} label="באיחור" color="#f87171"/>
        <StatCard icon="✅" value={stats.completedAssignments} label="הושלמו" color="#34d399"/>
        <StatCard icon="💬" value={stats.unreadMessages} label="הודעות חדשות" color="#f472b6"/>
      </div>

      <div className="two-col">
        <div className="sc">
          <div className="sc-title">📚 הקורסים שלי <span className="sc-count">{courses.length}</span></div>
          {top5.length===0?<div className="empty"><div className="empty-icon">📭</div><div className="empty-text">אין קורסים</div></div>
          :top5.map(c=>{
            const g=gradeMap[c.id];const gc=gradeClass(g);
            return(
              <div key={c.id} className="course-row">
                <div className="c-abbr" style={{background:courseColor(c.fullname)}}>{abbr(c.fullname)}</div>
                <div className="c-info">
                  <div className="c-name">{c.fullname}</div>
                  <div className="c-sub">{c.shortname||c.category}</div>
                  <div className="prog-bar"><div className="prog-fill" style={{width:c.progress+'%'}}/></div>
                </div>
                {g!=null?<span className={`grade-pill gp-${gc}`}>{g}</span>:<span className="grade-pill gp-none">—</span>}
              </div>
            );
          })}
        </div>

        <div className="sc">
          <div className="sc-title">⏰ משימות קרובות <span className="sc-count">{open.length}</span></div>
          {open.length===0?<div className="empty"><div className="empty-icon">🎉</div><div className="empty-text">אין משימות פתוחות</div></div>
          :open.slice(0,6).map(a=>{
            const{cls,label}=dayTag(a);
            return(
              <div key={a.id} className="assign-row">
                <div className="a-dot" style={{background:'var(--accent)'}}/>
                <div className="a-info"><div className="a-name">{a.name}</div><div className="a-course">{a.coursename}</div></div>
                <span className={`days-tag ${cls}`}>{label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Courses ───────────────────────────────────────────────────────────────
function Courses({data}){
  const{courses=[]}=data;
  if(!courses.length)return<div className="empty fade-in"><div className="empty-icon">📚</div><div className="empty-text">לא נמצאו קורסים</div></div>;
  return(
    <div className="courses-grid fade-in">
      {courses.map(c=>{
        const gc=gradeClass(c.grade);
        return(
          <div key={c.id} className="course-card">
            <div className="cc-top">
              <div className="cc-abbr" style={{background:courseColor(c.fullname)}}>{abbr(c.fullname)}</div>
              <div style={{flex:1}}>
                <div className="cc-name">{c.fullname}</div>
                <div className="cc-cat">{c.shortname||c.category}</div>
              </div>
              {c.grade!=null&&<div style={{fontSize:22,fontFamily:'Syne',fontWeight:800,color:gradeColor(c.grade)}}>{c.grade}</div>}
            </div>
            <div className="prog-bar"><div className="prog-fill" style={{width:c.progress+'%'}}/></div>
            <div className="cc-bottom">
              <span className="cc-prog-label">{c.progress}% הושלם</span>
              {c.grade!=null?<span className={`grade-pill gp-${gc}`}>{c.grade>=85?'מצוין':c.grade>=75?'טוב מאוד':c.grade>=60?'טוב':'לשיפור'}</span>:<span className="grade-pill gp-none">אין ציון</span>}
            </div>
            {c.gradeItems&&c.gradeItems.length>0&&(
              <div className="grade-items">
                {c.gradeItems.slice(0,4).map((it,i)=>(
                  <div key={i} className="gi-row">
                    <span className="gi-name">{it.name}</span>
                    <span className="gi-grade" style={{color:gradeColor(it.grade)}}>{it.grade}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Grades ────────────────────────────────────────────────────────────────
function Grades({data}){
  const{grades=[]}=data;
  if(!grades.length)return<div className="empty fade-in"><div className="empty-icon">📊</div><div className="empty-text">לא נמצאו ציונים</div></div>;
  return(
    <div className="fade-in">
      {grades.map((g,i)=>{
        const gc=gradeClass(g.grade);
        return(
          <div key={i} className="grade-card">
            <div className="grade-card-top">
              <div>
                <div className="gc-name">{g.coursename}</div>
                {g.items&&g.items.length>0&&<div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{g.items.length} פריטי ציון</div>}
              </div>
              <div className={`gc-grade ${gc}`}>{g.grade!=null?g.grade+'%':'—'}</div>
            </div>
            {g.items&&g.items.length>0&&(
              <div className="grade-sub-items">
                {g.items.map((it,j)=>(
                  <div key={j} className="gsi">
                    <div className="gsi-name">{it.name}</div>
                    <div className="gsi-val" style={{color:gradeColor(it.grade)}}>{it.grade}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Assignments ───────────────────────────────────────────────────────────
function Assignments({data}){
  const{assignments=[]}=data;
  const overdue=assignments.filter(a=>a.overdue&&!a.completed).sort((a,b)=>a.duedate-b.duedate);
  const open=assignments.filter(a=>!a.completed&&!a.overdue).sort((a,b)=>a.duedate-b.duedate);
  const done=assignments.filter(a=>a.completed);
  const Section=({list,title,cls})=>(
    list.length>0&&(
      <>
        <div className="sec-label">{title} ({list.length})</div>
        {list.map(a=>{
          const{cls:tc,label}=dayTag(a);
          const dotCls=a.completed?'done':a.overdue?'overdue':'open';
          return(
            <div key={a.id} className={`assign-card ${cls||''}`}>
              <div className={`ac-dot ${dotCls}`}/>
              <div className="ac-info">
                <div className="ac-name">{a.name}</div>
                <div className="ac-course">{a.coursename}</div>
                <div className="ac-date">{fmtDate(a.duedate)}</div>
              </div>
              <span className={`days-tag ${tc}`}>{label}</span>
            </div>
          );
        })}
      </>
    )
  );
  if(!assignments.length)return<div className="empty fade-in"><div className="empty-icon">📝</div><div className="empty-text">אין משימות</div></div>;
  return(
    <div className="fade-in">
      <Section list={overdue} title="🔴 באיחור" cls="overdue"/>
      <Section list={open} title="📌 פתוחות"/>
      <Section list={done} title="✅ הושלמו" cls="completed"/>
    </div>
  );
}

// ── Messages ──────────────────────────────────────────────────────────────
function Messages({data}){
  const{messages=[]}=data;
  if(!messages.length)return<div className="empty fade-in"><div className="empty-icon">💬</div><div className="empty-text">אין הודעות</div></div>;
  return(
    <div className="fade-in">
      {messages.map(m=>(
        <div key={m.id} className={`msg-card ${m.read?'':'unread'}`}>
          <div className={`msg-dot ${m.read?'read':'unread'}`}/>
          <div className="msg-body">
            <div className="msg-subject">{m.subject}</div>
            <div className="msg-from">מאת: {m.sender}</div>
            {m.text&&<div className="msg-text">{m.text.slice(0,200)}</div>}
          </div>
          <div className="msg-time">{timeAgo(m.timecreated)}</div>
        </div>
      ))}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function Dashboard({sessionId,fullname,onLogout}){
  const[tab,setTab]=useState('overview');
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState('');
  const[refreshing,setRefreshing]=useState(false);

  const load=useCallback(async(refresh=false)=>{
    if(refresh)setRefreshing(true); else setLoading(true);
    setErr('');
    try{
      const r=await fetch(`${API}/api/data?sessionId=${sessionId}${refresh?'&refresh=1':''}`);
      const d=await r.json();
      if(!r.ok){if(d.error==='SESSION_EXPIRED'){onLogout();return}throw new Error(d.error||'שגיאה')}
      setData(d);
    }catch(e){setErr(e.message)}
    finally{setLoading(false);setRefreshing(false)}
  },[sessionId]);

  useEffect(()=>{load()},[load]);

  const TABS=[
    {id:'overview',icon:'🏠',label:'סקירה'},
    {id:'courses',icon:'📚',label:'קורסים'},
    {id:'grades',icon:'🏆',label:'ציונים'},
    {id:'assignments',icon:'📝',label:'משימות',badge:data?.stats?.openAssignments},
    {id:'messages',icon:'💬',label:'הודעות',badge:data?.stats?.unreadMessages},
  ];

  const TITLES={overview:'סקירה כללית',courses:'הקורסים שלי',grades:'ציונים ומבחנים',assignments:'משימות',messages:'הודעות ועדכונים'};

  async function logout(){
    try{await fetch(`${API}/api/logout`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId})})}catch{}
    onLogout();
  }

  const initials=fullname?fullname.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase():'?';

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sb-top">
          <div className="sb-logo">
            <div className="sb-logo-icon">KC</div>
            <div className="sb-logo-text">KodCode</div>
          </div>
        </div>
        <div className="sb-user">
          <div className="sb-avatar">{initials}</div>
          <div><div className="sb-user-name">{fullname}</div><div className="sb-user-role">תלמיד</div></div>
        </div>
        <nav className="sb-nav">
          {TABS.map(t=>(
            <div key={t.id} className={`nav-item${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
              <span className="nav-icon">{t.icon}</span>
              <span>{t.label}</span>
              {t.badge>0&&<span className="nav-badge">{t.badge}</span>}
            </div>
          ))}
        </nav>
        <div className="sb-footer">
          <button className="btn-logout" onClick={logout}>🚪 התנתק</button>
        </div>
      </aside>

      <main className="main">
        <div className="page-header">
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
            <div>
              <div className="page-title">{TITLES[tab]}</div>
              <div className="page-sub">
                {tab==='overview'&&`שלום ${fullname} 👋 — ברוך הבא לפורטל שלך`}
                {tab==='courses'&&'כל הקורסים הפעילים שלך עם ציונים ופרוגרס'}
                {tab==='grades'&&'ציונים מלאים לפי קורס, כולל פירוט פריטים'}
                {tab==='assignments'&&'כל המשימות — פתוחות, באיחור ומושלמות'}
                {tab==='messages'&&'הודעות ועדכונים מהמסטרים שלך'}
              </div>
            </div>
            {data&&<button className="btn-refresh" onClick={()=>load(true)} disabled={refreshing}>{refreshing?'מרענן...':'🔄 רענן'}</button>}
          </div>
        </div>

        {loading&&<div className="loading"><div className="spinner-lg"/><div className="loading-text">שולף נתונים מ-Moodle...</div></div>}
        {!loading&&err&&<div className="err-box" style={{maxWidth:400}}>⚠️ {err}<br/><button style={{marginTop:10,cursor:'pointer',background:'none',border:'1px solid currentColor',borderRadius:6,padding:'4px 12px',color:'inherit',fontFamily:'inherit',fontSize:12}} onClick={()=>load()}>נסה שוב</button></div>}
        {!loading&&!err&&data&&(
          <>
            {tab==='overview'&&<Overview data={data} fullname={fullname}/>}
            {tab==='courses'&&<Courses data={data}/>}
            {tab==='grades'&&<Grades data={data}/>}
            {tab==='assignments'&&<Assignments data={data}/>}
            {tab==='messages'&&<Messages data={data}/>}
          </>
        )}
      </main>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App(){
  const[sid,setSid]=useState(()=>localStorage.getItem('sessionId'));
  const[name,setName]=useState(()=>localStorage.getItem('fullname')||'');
  function onLogin(id,n){setSid(id);setName(n)}
  function onLogout(){localStorage.removeItem('sessionId');localStorage.removeItem('fullname');setSid(null);setName('')}
  if(!sid)return <LoginPage onLogin={onLogin}/>;
  return <Dashboard sessionId={sid} fullname={name} onLogout={onLogout}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
