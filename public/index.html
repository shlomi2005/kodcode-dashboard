<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KodCode Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070b14;
      --bg2: #0d1220;
      --bg3: #111827;
      --card: rgba(255,255,255,0.03);
      --card-border: rgba(255,255,255,0.07);
      --card-hover: rgba(255,255,255,0.06);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #34d399;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --danger: #f87171;
      --warning: #fbbf24;
      --success: #34d399;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; font-family: 'Noto Sans Hebrew', sans-serif; background: var(--bg); color: var(--text); }
    #root { height: 100%; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ──────────────── LOGIN ──────────────── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; background: #38bdf8; top: -150px; right: -150px; }
    .orb-2 { width: 400px; height: 400px; background: #818cf8; bottom: -100px; left: -100px; }
    .orb-3 { width: 300px; height: 300px; background: #34d399; top: 50%; left: 50%; transform: translate(-50%,-50%); }

    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(13,18,32,0.9);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(56,189,248,0.08), 0 25px 50px rgba(0,0,0,0.5);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .login-logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: white;
      flex-shrink: 0;
    }

    .login-logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .login-subtitle { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 36px; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }

    .form-input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Noto Sans Hebrew', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      direction: ltr;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .form-input::placeholder { color: var(--text3); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Noto Sans Hebrew', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--danger);
      margin-top: 16px;
      text-align: center;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ──────────────── LAYOUT ──────────────── */
    .app-layout {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
    }

    /* ──────────────── SIDEBAR ──────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg2);
      border-left: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--card-border);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }

    .sidebar-logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .sidebar-user {
      padding: 16px 20px;
      border-bottom: 1px solid var(--card-border);
    }

    .sidebar-user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-user-label {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      user-select: none;
    }

    .nav-item:hover { background: var(--card-hover); color: var(--text); }
    .nav-item.active { background: rgba(56,189,248,0.12); color: var(--accent); }

    .nav-icon { font-size: 18px; flex-shrink: 0; }

    .nav-badge {
      margin-right: auto;
      background: var(--accent);
      color: var(--bg);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      min-width: 20px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--card-border);
    }

    .btn-logout {
      width: 100%;
      padding: 10px 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans Hebrew', sans-serif;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn-logout:hover { background: rgba(248,113,113,0.15); }

    /* ──────────────── MAIN ──────────────── */
    .main-content {
      flex: 1;
      margin-left: 0;
      margin-right: var(--sidebar-w);
      padding: 32px;
      overflow-y: auto;
      min-height: 100vh;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 32px;
    }

    /* ──────────────── LOADING ──────────────── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
      color: var(--text2);
    }

    .loading-spinner-lg {
      width: 40px; height: 40px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ──────────────── STATS GRID ──────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px 20px;
      transition: border-color 0.2s, background 0.2s;
    }

    .stat-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.12); }

    .stat-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text3);
    }

    /* ──────────────── TWO-COL ──────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    /* ──────────────── SECTION CARD ──────────────── */
    .section-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ──────────────── COURSE MINI ──────────────── */
    .course-mini {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .course-mini:last-child { border-bottom: none; }

    .course-abbr {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }

    .course-mini-info { flex: 1; min-width: 0; }
    .course-mini-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .course-mini-cat { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .progress-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 6px; }
    .progress-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #38bdf8, #818cf8); transition: width 0.6s ease; }

    /* ──────────────── ASSIGN MINI ──────────────── */
    .assign-mini {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .assign-mini:last-child { border-bottom: none; }

    .assign-mini-info { flex: 1; min-width: 0; }
    .assign-mini-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .assign-mini-course { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .days-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .days-badge.danger { background: rgba(248,113,113,0.15); color: var(--danger); }
    .days-badge.warning { background: rgba(251,191,36,0.15); color: var(--warning); }
    .days-badge.ok { background: rgba(52,211,153,0.12); color: var(--success); }
    .days-badge.overdue { background: rgba(248,113,113,0.2); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }

    /* ──────────────── COURSES GRID ──────────────── */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .course-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .course-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }

    .course-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .course-card-abbr { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: white; flex-shrink: 0; }
    .course-card-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .course-card-cat { font-size: 12px; color: var(--text3); margin-top: 3px; }

    .course-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
    .course-progress-label { font-size: 12px; color: var(--text3); }

    .grade-pill {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .grade-pill.high { background: rgba(52,211,153,0.15); color: var(--success); }
    .grade-pill.mid { background: rgba(251,191,36,0.15); color: var(--warning); }
    .grade-pill.low { background: rgba(248,113,113,0.15); color: var(--danger); }
    .grade-pill.none { background: rgba(255,255,255,0.06); color: var(--text3); }

    /* ──────────────── GRADES LIST ──────────────── */
    .grade-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .grade-row:hover { background: var(--card-hover); }
    .grade-row-name { font-size: 14px; color: var(--text); }

    .grade-num {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }

    .grade-num.high { color: var(--success); }
    .grade-num.mid { color: var(--warning); }
    .grade-num.low { color: var(--danger); }
    .grade-num.none { color: var(--text3); font-size: 14px; }

    /* ──────────────── ASSIGNMENTS ──────────────── */
    .assign-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 24px 0 12px;
    }

    .assign-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .assign-card:hover { background: var(--card-hover); }
    .assign-card.completed { opacity: 0.5; }

    .assign-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .assign-dot.open { background: var(--accent); }
    .assign-dot.done { background: var(--text3); }

    .assign-card-info { flex: 1; min-width: 0; }
    .assign-card-name { font-size: 14px; color: var(--text); }
    .assign-card.completed .assign-card-name { text-decoration: line-through; color: var(--text3); }
    .assign-card-course { font-size: 12px; color: var(--text3); margin-top: 3px; }

    /* ──────────────── MESSAGES ──────────────── */
    .message-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .message-card.unread { border-color: rgba(56,189,248,0.25); background: rgba(56,189,248,0.04); }
    .message-card:hover { background: var(--card-hover); }

    .msg-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .msg-dot.unread { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .msg-dot.read { background: var(--text3); }

    .msg-info { flex: 1; min-width: 0; }
    .msg-subject { font-size: 14px; font-weight: 500; color: var(--text); }
    .msg-sender { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .msg-text { font-size: 13px; color: var(--text2); margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .msg-time { font-size: 11px; color: var(--text3); white-space: nowrap; margin-top: 4px; }

    /* ──────────────── EMPTY STATE ──────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
      font-size: 14px;
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    /* ──────────────── RESPONSIVE ──────────────── */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo-text, .nav-item span, .sidebar-user, .btn-logout { display: none; }
      .main-content { margin-right: 60px; padding: 20px 16px; }
      --sidebar-w: 60px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const API_URL = window.location.origin;

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    const COURSE_COLORS = [
      '#38bdf8','#818cf8','#34d399','#f472b6','#fb923c',
      '#a78bfa','#22d3ee','#4ade80','#facc15','#f87171'
    ];

    function getCourseColor(name = '') {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return COURSE_COLORS[Math.abs(hash) % COURSE_COLORS.length];
    }

    function getAbbr(name = '') {
      const words = name.trim().split(/\s+/);
      if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    function gradeClass(g) {
      if (typeof g !== 'number') return 'none';
      if (g >= 85) return 'high';
      if (g >= 60) return 'mid';
      return 'low';
    }

    function formatDate(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleDateString('he-IL', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function timeAgo(ts) {
      const diff = Date.now() / 1000 - ts;
      if (diff < 60) return 'עכשיו';
      if (diff < 3600) return `לפני ${Math.floor(diff/60)} דק'`;
      if (diff < 86400) return `לפני ${Math.floor(diff/3600)} שעות`;
      return `לפני ${Math.floor(diff/86400)} ימים`;
    }

    function daysBadge(daysLeft, overdue) {
      if (overdue) return { cls: 'overdue', label: 'פג תוקף' };
      if (daysLeft <= 0) return { cls: 'overdue', label: 'היום' };
      if (daysLeft <= 2) return { cls: 'danger', label: `${daysLeft} ימים` };
      if (daysLeft <= 7) return { cls: 'warning', label: `${daysLeft} ימים` };
      return { cls: 'ok', label: `${daysLeft} ימים` };
    }

    // ─── SPINNER ──────────────────────────────────────────────────────────────
    function Spinner() { return <span className="spinner" />; }

    // ─── LOGIN PAGE ───────────────────────────────────────────────────────────
    function LoginPage({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      async function handleSubmit(e) {
        e.preventDefault();
        if (!username || !password) { setError('נא למלא את כל השדות'); return; }
        setLoading(true);
        setError('');
        try {
          const res = await fetch(`${API_URL}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username.trim(), password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'שגיאת התחברות');
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('fullname', data.fullname);
          onLogin(data.sessionId, data.fullname);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="login-page">
          <div className="orb orb-1" />
          <div className="orb orb-2" />
          <div className="orb orb-3" />
          <div className="login-card">
            <div className="login-logo">
              <div className="login-logo-icon">KC</div>
              <div className="login-logo-text">KodCode Dashboard</div>
            </div>
            <div className="login-subtitle">הכנס את פרטי הכניסה שלך למערכת מודל</div>
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label className="form-label">תעודת זהות</label>
                <input
                  className="form-input"
                  type="text"
                  placeholder="מספר תעודת זהות"
                  value={username}
                  onChange={e => setUsername(e.target.value)}
                  disabled={loading}
                  autoComplete="username"
                />
              </div>
              <div className="form-group">
                <label className="form-label">סיסמה</label>
                <input
                  className="form-input"
                  type="password"
                  placeholder="הסיסמה שלך"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  disabled={loading}
                  autoComplete="current-password"
                />
              </div>
              <button className="btn-login" type="submit" disabled={loading}>
                {loading ? (<>מתחבר...<Spinner /></>) : 'כניסה למערכת'}
              </button>
              {error && <div className="login-error">{error}</div>}
            </form>
          </div>
        </div>
      );
    }

    // ─── LOADING VIEW ─────────────────────────────────────────────────────────
    function LoadingView({ text = 'טוען נתונים...' }) {
      return (
        <div className="loading-overlay">
          <div className="loading-spinner-lg" />
          <span>{text}</span>
        </div>
      );
    }

    // ─── OVERVIEW TAB ─────────────────────────────────────────────────────────
    function OverviewTab({ data }) {
      const { courses = [], grades = [], assignments = [] } = data;
      const now = Date.now() / 1000;

      const openAssign = assignments.filter(a => !a.completed && !a.overdue);
      const avgGrade = (() => {
        const nums = grades.filter(g => g.isNumeric).map(g => g.grade);
        if (!nums.length) return null;
        return Math.round(nums.reduce((s,v) => s+v, 0) / nums.length);
      })();

      const stats = [
        { icon: '📚', value: courses.length, label: 'קורסים פעילים' },
        { icon: '📊', value: avgGrade != null ? avgGrade : '—', label: 'ממוצע ציונים' },
        { icon: '📝', value: openAssign.length, label: 'משימות פתוחות' },
        { icon: '✅', value: assignments.filter(a => a.completed).length, label: 'משימות שהושלמו' },
      ];

      const recentCourses = courses.slice(0, 5);
      const upcomingAssign = assignments.filter(a => !a.completed).sort((a,b) => a.duedate - b.duedate).slice(0, 5);

      return (
        <>
          <div className="stats-grid">
            {stats.map((s, i) => (
              <div key={i} className="stat-card">
                <div className="stat-icon">{s.icon}</div>
                <div className="stat-value">{s.value}</div>
                <div className="stat-label">{s.label}</div>
              </div>
            ))}
          </div>

          <div className="two-col">
            <div className="section-card">
              <div className="section-title">📚 קורסים אחרונים</div>
              {recentCourses.length === 0
                ? <div className="empty-state"><div className="empty-state-icon">📭</div>אין קורסים</div>
                : recentCourses.map(c => (
                  <div key={c.id} className="course-mini">
                    <div className="course-abbr" style={{ background: getCourseColor(c.fullname) }}>{getAbbr(c.fullname)}</div>
                    <div className="course-mini-info">
                      <div className="course-mini-name">{c.fullname}</div>
                      <div className="course-mini-cat">{c.category || c.shortname}</div>
                      <div className="progress-bar-wrap">
                        <div className="progress-bar-fill" style={{ width: `${c.progress || 0}%` }} />
                      </div>
                    </div>
                  </div>
                ))
              }
            </div>

            <div className="section-card">
              <div className="section-title">📅 משימות קרובות</div>
              {upcomingAssign.length === 0
                ? <div className="empty-state"><div className="empty-state-icon">🎉</div>אין משימות פתוחות</div>
                : upcomingAssign.map(a => {
                  const { cls, label } = daysBadge(a.daysLeft, a.overdue);
                  return (
                    <div key={a.id} className="assign-mini">
                      <div className="assign-mini-info">
                        <div className="assign-mini-name">{a.name}</div>
                        <div className="assign-mini-course">{a.coursename}</div>
                      </div>
                      <span className={`days-badge ${cls}`}>{label}</span>
                    </div>
                  );
                })
              }
            </div>
          </div>
        </>
      );
    }

    // ─── COURSES TAB ──────────────────────────────────────────────────────────
    function CoursesTab({ data }) {
      const { courses = [], grades = [] } = data;
      const gradeMap = {};
      grades.forEach(g => { gradeMap[g.coursename] = g; });

      if (courses.length === 0) return (
        <div className="empty-state" style={{ marginTop: 60 }}>
          <div className="empty-state-icon">📚</div>
          לא נמצאו קורסים
        </div>
      );

      return (
        <div className="courses-grid">
          {courses.map(c => {
            const grade = gradeMap[c.fullname];
            const gradeVal = grade ? grade.grade : null;
            const cls = gradeClass(gradeVal);
            return (
              <div key={c.id} className="course-card">
                <div className="course-card-header">
                  <div className="course-card-abbr" style={{ background: getCourseColor(c.fullname) }}>{getAbbr(c.fullname)}</div>
                  <div>
                    <div className="course-card-name">{c.fullname}</div>
                    <div className="course-card-cat">{c.category || c.shortname}</div>
                  </div>
                </div>
                <div className="progress-bar-wrap">
                  <div className="progress-bar-fill" style={{ width: `${c.progress || 0}%` }} />
                </div>
                <div className="course-card-footer">
                  <span className="course-progress-label">{c.progress || 0}% הושלם</span>
                  {gradeVal != null
                    ? <span className={`grade-pill ${cls}`}>{typeof gradeVal === 'number' ? gradeVal : gradeVal}</span>
                    : <span className="grade-pill none">אין ציון</span>
                  }
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── GRADES TAB ───────────────────────────────────────────────────────────
    function GradesTab({ data }) {
      const { grades = [] } = data;
      if (grades.length === 0) return (
        <div className="empty-state" style={{ marginTop: 60 }}>
          <div className="empty-state-icon">📊</div>
          לא נמצאו ציונים
        </div>
      );
      return (
        <div>
          {grades.map((g, i) => {
            const cls = gradeClass(g.grade);
            return (
              <div key={i} className="grade-row">
                <span className="grade-row-name">{g.coursename}</span>
                <span className={`grade-num ${cls}`}>{g.grade}</span>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── ASSIGNMENTS TAB ──────────────────────────────────────────────────────
    function AssignmentsTab({ data }) {
      const { assignments = [] } = data;
      const open = assignments.filter(a => !a.completed).sort((a,b) => a.duedate - b.duedate);
      const done = assignments.filter(a => a.completed);

      return (
        <div>
          <div className="assign-section-title">משימות פתוחות ({open.length})</div>
          {open.length === 0
            ? <div className="empty-state"><div className="empty-state-icon">🎉</div>אין משימות פתוחות</div>
            : open.map(a => {
              const { cls, label } = daysBadge(a.daysLeft, a.overdue);
              return (
                <div key={a.id} className="assign-card">
                  <div className="assign-dot open" />
                  <div className="assign-card-info">
                    <div className="assign-card-name">{a.name}</div>
                    <div className="assign-card-course">{a.coursename} · {formatDate(a.duedate)}</div>
                  </div>
                  <span className={`days-badge ${cls}`}>{label}</span>
                </div>
              );
            })
          }

          {done.length > 0 && (
            <>
              <div className="assign-section-title" style={{ marginTop: 32 }}>הושלמו ({done.length})</div>
              {done.map(a => (
                <div key={a.id} className="assign-card completed">
                  <div className="assign-dot done" />
                  <div className="assign-card-info">
                    <div className="assign-card-name">{a.name}</div>
                    <div className="assign-card-course">{a.coursename}</div>
                  </div>
                  <span className="days-badge ok">הושלם</span>
                </div>
              ))}
            </>
          )}
        </div>
      );
    }

    // ─── MESSAGES TAB ─────────────────────────────────────────────────────────
    function MessagesTab({ data }) {
      const { messages = [] } = data;
      if (messages.length === 0) return (
        <div className="empty-state" style={{ marginTop: 60 }}>
          <div className="empty-state-icon">💬</div>
          אין הודעות
        </div>
      );
      return (
        <div>
          {messages.map(m => (
            <div key={m.id} className={`message-card ${m.read ? '' : 'unread'}`}>
              <div className={`msg-dot ${m.read ? 'read' : 'unread'}`} />
              <div className="msg-info">
                <div className="msg-subject">{m.subject}</div>
                <div className="msg-sender">{m.sender}</div>
                {m.text && <div className="msg-text" dangerouslySetInnerHTML={{ __html: m.text.replace(/<[^>]+>/g,'').slice(0,200) }} />}
              </div>
              <div className="msg-time">{timeAgo(m.timecreated)}</div>
            </div>
          ))}
        </div>
      );
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────
    function Dashboard({ sessionId, fullname, onLogout }) {
      const [activeTab, setActiveTab] = useState('overview');
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      useEffect(() => {
        let cancelled = false;
        async function load() {
          setLoading(true);
          setError('');
          try {
            const res = await fetch(`${API_URL}/api/data?sessionId=${sessionId}`);
            const d = await res.json();
            if (!res.ok) {
              if (d.error === 'SESSION_EXPIRED') { onLogout(); return; }
              throw new Error(d.error || 'שגיאת שרת');
            }
            if (!cancelled) setData(d);
          } catch (err) {
            if (!cancelled) setError(err.message);
          } finally {
            if (!cancelled) setLoading(false);
          }
        }
        load();
        return () => { cancelled = true; };
      }, [sessionId]);

      const tabs = [
        { id: 'overview',     icon: '🏠', label: 'סקירה כללית' },
        { id: 'courses',      icon: '📚', label: 'קורסים' },
        { id: 'grades',       icon: '📊', label: 'ציונים' },
        { id: 'assignments',  icon: '📝', label: 'משימות' },
        { id: 'messages',     icon: '💬', label: 'הודעות',
          badge: data ? data.messages.filter(m => !m.read).length : 0 },
      ];

      const tabTitles = {
        overview: 'סקירה כללית',
        courses: 'קורסים',
        grades: 'ציונים',
        assignments: 'משימות',
        messages: 'הודעות',
      };

      async function handleLogout() {
        try {
          await fetch(`${API_URL}/api/logout`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId }),
          });
        } catch {}
        onLogout();
      }

      return (
        <div className="app-layout">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo">
                <div className="sidebar-logo-icon">KC</div>
                <div className="sidebar-logo-text">KodCode</div>
              </div>
            </div>
            <div className="sidebar-user">
              <div className="sidebar-user-name">{fullname}</div>
              <div className="sidebar-user-label">תלמיד</div>
            </div>
            <nav className="sidebar-nav">
              {tabs.map(t => (
                <div
                  key={t.id}
                  className={`nav-item ${activeTab === t.id ? 'active' : ''}`}
                  onClick={() => setActiveTab(t.id)}
                >
                  <span className="nav-icon">{t.icon}</span>
                  <span>{t.label}</span>
                  {t.badge > 0 && <span className="nav-badge">{t.badge}</span>}
                </div>
              ))}
            </nav>
            <div className="sidebar-footer">
              <button className="btn-logout" onClick={handleLogout}>🚪 התנתק</button>
            </div>
          </aside>

          {/* Main */}
          <main className="main-content">
            <div className="page-title">{tabTitles[activeTab]}</div>
            <div className="page-subtitle">
              {activeTab === 'overview' && `שלום, ${fullname}! ברוך הבא ל-KodCode Dashboard`}
              {activeTab === 'courses' && 'כל הקורסים הפעילים שלך'}
              {activeTab === 'grades' && 'סיכום הציונים שלך'}
              {activeTab === 'assignments' && 'המשימות הפתוחות והמושלמות שלך'}
              {activeTab === 'messages' && 'ההודעות והעדכונים שלך'}
            </div>

            {loading && <LoadingView />}
            {!loading && error && (
              <div className="login-error" style={{ maxWidth: 400 }}>
                ⚠️ {error}
                <button style={{ marginTop: 12, display: 'block', cursor: 'pointer', background: 'none', border: '1px solid currentColor', borderRadius: 6, padding: '4px 12px', color: 'inherit', fontFamily: 'inherit' }} onClick={() => window.location.reload()}>נסה שוב</button>
              </div>
            )}
            {!loading && !error && data && (
              <>
                {activeTab === 'overview'    && <OverviewTab    data={data} />}
                {activeTab === 'courses'     && <CoursesTab     data={data} />}
                {activeTab === 'grades'      && <GradesTab      data={data} />}
                {activeTab === 'assignments' && <AssignmentsTab data={data} />}
                {activeTab === 'messages'    && <MessagesTab    data={data} />}
              </>
            )}
          </main>
        </div>
      );
    }

    // ─── ROOT APP ─────────────────────────────────────────────────────────────
    function App() {
      const [sessionId, setSessionId] = useState(() => localStorage.getItem('sessionId'));
      const [fullname, setFullname]   = useState(() => localStorage.getItem('fullname') || '');

      function handleLogin(id, name) {
        setSessionId(id);
        setFullname(name);
      }

      function handleLogout() {
        localStorage.removeItem('sessionId');
        localStorage.removeItem('fullname');
        setSessionId(null);
        setFullname('');
      }

      if (!sessionId) return <LoginPage onLogin={handleLogin} />;
      return <Dashboard sessionId={sessionId} fullname={fullname} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
